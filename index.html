<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro KhataBook - VIP Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <!-- Premium VIP Header -->
        <div class="app-header">
            <div class="rk-logo-box">
                <span class="rk-logo-text">RK</span>
            </div>
            <div class="header-text">
                <h2>Mera KhataBook</h2>
                <span class="developer-tag">By <b>RK Solution</b> | VIP Edition</span>
            </div>
        </div>

        <!-- Glassmorphism Dashboard -->
        <div class="dashboard-wrapper">
            <div class="dashboard-card glass-panel"> 
                <p class="shop-name">
                    <span id="shopNameDisplay" onclick="editShopName()" title="Dukan ka naam badalein">Apni Dukan</span> <span class="edit-icon">✏️</span>
                </p>
                <p class="balance-label">Total Market Udhar</p> 
                <h1 id="totalShopBalance" class="neon-text">₹0</h1> 
                <button class="btn-history" onclick="showShopHistory()">📊 Dukan Ki Analytics & History</button>
            </div>
        </div>

        <!-- Glowing Mic Section (Direct Entry) -->
        <div class="mic-section">
            <button id="micBtn" class="btn-mic-glowing" onclick="startVoiceRecognition()">
                <span class="mic-icon">🎙️</span> Bolkar Likhain ya Poochhein
            </button>
            <p id="micStatus" class="mic-status">Poochiye: "Aaj kitna udhar gaya?"</p>
        </div>

        <!-- Manual Entry Section -->
        <div class="action-section"> 
            <input type="text" id="searchInput" class="premium-input search-input" onkeyup="searchCustomer()" placeholder="🔍 Grahak dhoondhein..."> 
            
            <div class="manual-entry-card glass-panel">
                <input type="text" id="customerName" class="premium-input" placeholder="👤 Grahak ka naam"> 
                <div class="input-row">
                    <input type="number" id="amount" class="premium-input half-input" placeholder="₹ Amount"> 
                    <input type="text" id="items" class="premium-input half-input" placeholder="🛍️ Samaan"> 
                </div>
                <div class="button-group"> 
                    <button class="btn-vip btn-red" onclick="addTransaction('udhar')">Udhar Likh Do</button> 
                    <button class="btn-vip btn-green" onclick="addTransaction('jama')">Paise Jama</button> 
                </div>
            </div>
        </div>

        <!-- Accounts List -->
        <div class="list-container">
            <h3 class="list-heading">Grahak List</h3>
            <div id="accountList" class="list-section"></div>
        </div>

    </div>

    <!-- Modals (Popups) -->
    <div id="customAlertOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box glass-panel">
            <div class="alert-icon" id="alertIconDisplay">⚠️</div>
            <h3 id="customAlertMessage">Error</h3>
            <button onclick="closeAllModals()" class="btn-modal-ok">Theek Hai</button>
        </div>
    </div>

    <div id="singleInputOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box glass-panel">
            <h3 id="singleInputTitle">Naya Naam Dalen</h3>
            <input type="text" id="singleInputValue" class="premium-input" placeholder="Type karein...">
            <div class="modal-button-group">
                <button id="btnSingleSave" class="btn-vip btn-green">Save</button>
                <button onclick="closeAllModals()" class="btn-vip btn-red">Cancel</button>
            </div>
        </div>
    </div>

    <div id="confirmOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box glass-panel">
            <div class="alert-icon" id="confirmIconDisplay" style="color: #ff4757;">🗑️</div>
            <h3 id="confirmTitle">Kya aap sure hain?</h3>
            <div class="modal-button-group">
                <button id="btnConfirmYes" class="btn-vip btn-red">Haan</button>
                <button onclick="closeAllModals()" class="btn-vip btn-gray">Nahi</button>
            </div>
        </div>
    </div>

    <div id="historyOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box glass-panel history-modal">
            <h3 class="history-title">📊 Dukan Analytics</h3>
            <ul id="historyDataList" class="history-list"></ul>
            <button onclick="closeAllModals()" class="btn-modal-ok">Band Karein</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
