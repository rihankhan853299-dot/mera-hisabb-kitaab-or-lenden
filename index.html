<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hisaab kitaab</title>
    <!-- CSS file ko connect kar rahe hain -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- 🌟 Header: RK Solution Branding -->
        <div class="app-header">
            <div class="rk-logo-box">
                <span class="rk-logo-text">RK</span>
            </div>
            <div>
                <h2>Mera KhataBook</h2>
                <span class="developer-tag">Developed by <b>Rihan Khan</b></span>
            </div>
        </div>

        <!-- 🌟 Dashboard: Dukan ka Total Balance -->
        <div class="dashboard"> 
            <p>
                <span id="shopNameDisplay" onclick="editShopName()" title="Dukan ka naam badalne ke liye click karein">Apni Dukan</span> Ka Total Udhar ✏️
            </p> 
            <h1 id="totalShopBalance">₹0</h1> 
        </div>

        <!-- 🌟 Search Bar -->
        <div class="search-section"> 
            <input type="text" id="searchInput" onkeyup="searchCustomer()" placeholder="🔍 Grahak dhoondhein..."> 
        </div>

        <!-- 🌟 Voice AI Mic Section -->
        <div class="mic-section">
            <button id="micBtn" class="btn-mic" onclick="startVoiceRecognition()">🎙️ Bolkar Likhain ya Poochhein</button>
            <p id="micStatus" class="mic-status"></p>
        </div>

        <!-- 🌟 Manual Entry Box -->
        <div class="card input-section"> 
            <input type="text" id="customerName" placeholder="👤 Grahak ka naam (Naye grahak ke liye)"> 
            <input type="number" id="amount" placeholder="₹ Kitne rupiye?"> 
            <input type="text" id="items" placeholder="🛍️ Samaan ki detail"> 
            
            <div class="button-group"> 
                <button class="btn-udhar" onclick="addTransaction('udhar')">Udhar Likh Do</button> 
                <button class="btn-jama" onclick="addTransaction('jama')">Paise Jama Karlo</button> 
            </div>
        </div>

        <!-- 🌟 Grahakon Ki List -->
        <div id="accountList" class="list-section"> 
            <!-- Javascript yahan apne aap data bharegi -->
        </div>

    </div>

    <!-- ==========================================
         🌟 PROFESSIONAL CUSTOM MODALS (POPUPS)
    =========================================== -->

    <!-- 1. Error / Robot Voice Jawab Popup -->
    <div id="customAlertOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div class="alert-icon" id="alertIconDisplay">⚠️</div>
            <h3 id="customAlertMessage" style="line-height: 1.5;">Error</h3>
            <button onclick="closeAllModals()" class="btn-modal-ok">Theek Hai</button>
        </div>
    </div>

    <!-- 2. Ek Input Wala Popup (Naam badalne ke liye) -->
    <div id="singleInputOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <h3 id="singleInputTitle">Naya Naam Dalen</h3>
            <input type="text" id="singleInputValue" placeholder="Yahan type karein...">
            <div class="modal-button-group">
                <button id="btnSingleSave" class="btn-jama">Save</button>
                <button onclick="closeAllModals()" class="btn-udhar">Cancel</button>
            </div>
        </div>
    </div>

    <!-- 3. Do Input Wala Popup (Udhar Likhne / Edit ke liye) -->
    <div id="doubleInputOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <h3 id="doubleInputTitle">Naya Udhar Likhein</h3>
            <input type="number" id="doubleInput1" placeholder="₹ Amount">
            <input type="text" id="doubleInput2" placeholder="🛍️ Samaan">
            <div class="modal-button-group">
                <button id="btnDoubleSave" class="btn-jama">OK (Save)</button>
                <button onclick="closeAllModals()" class="btn-udhar">Cancel</button>
            </div>
        </div>
    </div>

    <!-- 4. Confirm Delete Popup -->
    <div id="confirmOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div class="alert-icon" style="color: #ff4757;">🗑️</div>
            <h3 id="confirmTitle">Kya aap sure hain?</h3>
            <div class="modal-button-group">
                <button id="btnConfirmYes" class="btn-udhar">Haan, Delete Karo</button>
                <button onclick="closeAllModals()" class="btn-jama">Nahi</button>
            </div>
        </div>
    </div>

    <!-- Javascript file ko connect kar rahe hain -->
    <script src="script.js"></script>
</body>
</html>
