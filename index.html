<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro KhataBook - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Modern Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <!-- Premium Header -->
        <div class="app-header">
            <div class="rk-logo-box">
                <span class="rk-logo-text">RK</span>
            </div>
            <div class="header-text">
                <h2>Mera KhataBook</h2>
                <span class="developer-tag">Developed by <b>RK Solution</b></span>
            </div>
        </div>

        <!-- Premium Dashboard Card -->
        <div class="dashboard-wrapper">
            <div class="dashboard-card"> 
                <p class="shop-name">
                    <span id="shopNameDisplay" onclick="editShopName()" title="Dukan ka naam badalein">Apni Dukan</span> ✏️
                </p>
                <p class="balance-label">Dukan Ka Total Udhar</p> 
                <h1 id="totalShopBalance">₹0</h1> 
                <button class="btn-history" onclick="showShopHistory()">📅 Udhar History Dekhein</button>
            </div>
        </div>

        <!-- Voice AI Mic Section (Center Prominent) -->
        <div class="mic-section">
            <p class="mic-hint">Poochiye: "Sabse zyada udhar kis par hai?" ya "Aaj kitna udhar gaya?"</p>
            <button id="micBtn" class="btn-mic" onclick="startVoiceRecognition()">
                <span class="mic-icon">🎙️</span> Bolkar Likhain ya Poochhein
            </button>
            <p id="micStatus" class="mic-status"></p>
        </div>

        <!-- Search & Manual Entry -->
        <div class="action-section"> 
            <input type="text" id="searchInput" class="premium-input search-input" onkeyup="searchCustomer()" placeholder="🔍 Grahak dhoondhein..."> 
            
            <div class="manual-entry-card">
                <input type="text" id="customerName" class="premium-input" placeholder="👤 Grahak ka naam"> 
                <div class="input-row">
                    <input type="number" id="amount" class="premium-input half-input" placeholder="₹ Amount"> 
                    <input type="text" id="items" class="premium-input half-input" placeholder="🛍️ Samaan"> 
                </div>
                <div class="button-group"> 
                    <button class="btn-premium btn-red" onclick="addTransaction('udhar')">Udhar Likh Do</button> 
                    <button class="btn-premium btn-green" onclick="addTransaction('jama')">Paise Jama Karlo</button> 
                </div>
            </div>
        </div>

        <!-- Grahakon Ki List -->
        <div class="list-container">
            <h3 class="list-heading">Grahak List</h3>
            <div id="accountList" class="list-section"></div>
        </div>

    </div>

    <!-- ==========================================
         🌟 CUSTOM MODALS (POPUPS)
    =========================================== -->
    <div id="customAlertOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div class="alert-icon" id="alertIconDisplay">⚠️</div>
            <h3 id="customAlertMessage">Error</h3>
            <button onclick="closeAllModals()" class="btn-modal-ok">Theek Hai</button>
        </div>
    </div>

    <div id="singleInputOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <h3 id="singleInputTitle">Naya Naam Dalen</h3>
            <input type="text" id="singleInputValue" class="premium-input" placeholder="Yahan type karein...">
            <div class="modal-button-group">
                <button id="btnSingleSave" class="btn-premium btn-green">Save</button>
                <button onclick="closeAllModals()" class="btn-premium btn-red">Cancel</button>
            </div>
        </div>
    </div>

    <div id="confirmOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box">
            <div class="alert-icon" id="confirmIconDisplay" style="color: #ef4444;">🗑️</div>
            <h3 id="confirmTitle">Kya aap sure hain?</h3>
            <div class="modal-button-group">
                <button id="btnConfirmYes" class="btn-premium btn-red">Haan</button>
                <button onclick="closeAllModals()" class="btn-premium btn-gray">Nahi</button>
            </div>
        </div>
    </div>

    <div id="historyOverlay" class="custom-modal-overlay">
        <div class="custom-modal-box history-modal">
            <h3 class="history-title">📅 Dukan Ki Udhar History</h3>
            <ul id="historyDataList" class="history-list"></ul>
            <button onclick="closeAllModals()" class="btn-modal-ok">Band Karein</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
